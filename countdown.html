<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Starting Soon Countdown</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            width: 1920px; height: 1080px;
            background: transparent;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            padding: 80px 140px;
            text-align: center;
            backdrop-filter: blur(30px);
            box-shadow: 0 40px 120px rgba(0,0,0,0.9), inset 0 0 40px rgba(255, 215, 0, 0.05);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 15%; right: 15%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.8), transparent);
        }

        h1 {
            color: #FFFFFF;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 15px;
            margin: 0 0 30px 0;
            text-transform: uppercase;
        }

        h1 span {
            color: #FFD700;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
        }

        .timer {
            color: #FFD700;
            font-size: 180px;
            font-weight: 300;
            letter-spacing: 10px;
            margin: 0;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.2);
            font-variant-numeric: tabular-nums;
        }

        .subtitle {
            color: #888888;
            font-size: 18px;
            letter-spacing: 8px;
            margin-top: 40px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>AI</span> PASSPORT&trade;</h1>
        <div class="timer" id="clock">10:00</div>
        <div class="subtitle">National Launch Event</div>
    </div>

    <script>
        let timeInSeconds = 10 * 60; // 10 minutes
        const clockElement = document.getElementById('clock');

        function updateClock() {
            if (timeInSeconds <= 0) {
                clockElement.innerText = "00:00";
                return;
            }

            const minutes = Math.floor(timeInSeconds / 60);
            const seconds = timeInSeconds % 60;
            
            clockElement.innerText = 
                String(minutes).padStart(2, '0') + ":" + 
                String(seconds).padStart(2, '0');
                
            timeInSeconds--;
            setTimeout(updateClock, 1000);
        }

        updateClock();
    </script>
</body>
</html>
