<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Panel Layout</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body, html { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; font-family: 'Inter', sans-serif; overflow: hidden; position: relative; }
        
        .logo-top-center {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 10;
        }
        .logo-top-center h1 {
            color: #FFFFFF; font-size: 20px; font-weight: 900; letter-spacing: 10px; margin: 0; text-transform: uppercase;
        }
        .logo-top-center span { color: #FFD700; }

        .frame {
            position: absolute; top: 180px; height: 720px; width: 800px;
            border: 1px solid rgba(255, 215, 0, 0.4); border-radius: 16px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.1), inset 0 0 30px rgba(255, 215, 0, 0.05);
            background: transparent; z-index: 10;
        }
        .frame::after {
            content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 1px solid #FFD700; border-radius: 16px; opacity: 0.3; pointer-events: none;
        }

        /* 50/50 Split */
        .left-frame { left: 120px; }
        .right-frame { right: 120px; }

        .name-badge {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            background: #050505; border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 10px 30px; border-radius: 30px; color: #FFF; font-size: 14px;
            font-weight: 600; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap;
        }
        .name-badge span { color: #FFD700; font-weight: 900; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="logo-top-center">
        <h1><span>AI</span> PASSPORT&trade;</h1>
    </div>

    <div class="frame left-frame">
        <div class="name-badge"><span>HITESH RATHEE</span> Founder</div>
    </div>

    <div class="frame right-frame">
        <div class="name-badge"><span>NISHANT</span> Panelist</div>
    </div>
</body>
</html>
