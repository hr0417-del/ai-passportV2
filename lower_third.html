<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lower Third</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: transparent;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .lower-third-container {
            position: absolute;
            bottom: 120px;
            left: -1000px;
            display: flex;
            align-items: center;
            animation: slideIn 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 1.5s; 
        }

        .logo-box {
            background: linear-gradient(135deg, #FFD700 0%, #997300 100%);
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #050505;
            font-size: 32px;
            font-weight: 900;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            z-index: 2;
        }

        .text-box {
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-left: none;
            padding: 15px 50px 15px 30px;
            height: 58px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(20px);
            box-shadow: 15px 15px 50px rgba(0,0,0,0.8);
        }

        .text-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, #FFD700 0%, transparent 100%);
        }

        .name {
            color: #FFFFFF;
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0 0 4px 0;
            text-transform: uppercase;
        }

        .title {
            color: #FFD700;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 5px;
            margin: 0;
            text-transform: uppercase;
        }

        @keyframes slideIn {
            0% { left: -1000px; }
            100% { left: 120px; }
        }
    </style>
</head>
<body>
    <div class="lower-third-container">
        <div class="logo-box">AI</div>
        <div class="text-box">
            <h1 class="name">HITESH RATHEE</h1>
            <h2 class="title">Founder | AI Passport&trade;</h2>
        </div>
    </div>
</body>
</html>
