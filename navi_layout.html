<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navi Layout</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body, html { margin: 0; padding: 0; width: 1920px; height: 1080px; background: transparent; font-family: 'Inter', sans-serif; overflow: hidden; position: relative; }
        
        .logo-top-center {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 10;
        }
        .logo-top-center h1 {
            color: #FFFFFF; font-size: 20px; font-weight: 900; letter-spacing: 10px; margin: 0; text-transform: uppercase;
        }
        .logo-top-center span { color: #00E5FF; /* Electric Blue for AI scene */ }

        .frame {
            position: absolute; top: 180px; height: 720px; width: 800px;
            border-radius: 16px; background: transparent; z-index: 10;
        }

        /* Human Frame (Gold) */
        .left-frame { 
            left: 120px; 
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
        }
        
        /* AI Frame (Electric Blue/Purple) */
        .right-frame { 
            right: 120px; 
            border: 1px solid rgba(138, 43, 226, 0.6); /* Purple accent */
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.15), inset 0 0 30px rgba(138, 43, 226, 0.1);
        }
        .right-frame::after {
            content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 1px solid #00E5FF; border-radius: 16px; opacity: 0.4; pointer-events: none;
        }

        .name-badge {
            position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            background: #050505; padding: 10px 30px; border-radius: 30px; color: #FFF; font-size: 14px;
            font-weight: 600; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap;
        }
        
        .badge-human { border: 1px solid rgba(255, 215, 0, 0.3); }
        .badge-human span { color: #FFD700; font-weight: 900; margin-right: 10px; }
        
        .badge-ai { border: 1px solid rgba(138, 43, 226, 0.5); }
        .badge-ai span { color: #00E5FF; font-weight: 900; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="logo-top-center">
        <h1><span>NAVI</span> INTEGRATION</h1>
    </div>

    <div class="frame left-frame">
        <div class="name-badge badge-human"><span>HITESH</span> Host</div>
    </div>

    <div class="frame right-frame">
        <div class="name-badge badge-ai"><span>GEMINI</span> Intelligence</div>
    </div>
</body>
</html>
