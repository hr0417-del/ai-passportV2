<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Particle Border</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent; /* Transparent for OBS */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .border-container {
            width: 100%;
            height: 100%;
            border-radius: 24px;
            background-color: #000000;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); /* Subtle gold glow on the edge */
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="border-container">
        <canvas id="particleCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.parentElement.clientWidth;
            height = canvas.parentElement.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        window.addEventListener('resize', resize);
        
        // Particles setup
        const particles = [];
        const numParticles = 150; // Number of dots
        const colors = ['#FFFFFF', '#FFD700', '#FDB813', '#FFF5B8']; // White and various Golden shades

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.0; // Speed X
                this.vy = (Math.random() - 0.5) * 1.0; // Speed Y
                this.radius = Math.random() * 2.5 + 0.5; // Size
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Wrap around edges smoothly
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                
                // Add a little glow to the dots
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                
                ctx.fill();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
            animate();
        }

        function animate() {
            // Clear background with solid black
            ctx.shadowBlur = 0; // reset shadow before clearing
            ctx.fillStyle = '#000000'; 
            ctx.fillRect(0, 0, width, height);

            // Draw all particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // Start animation
        setTimeout(init, 50);
    </script>
</body>
</html>
